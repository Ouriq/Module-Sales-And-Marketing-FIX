<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Indofood</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <span class="header-title">LOGIN</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" title="Ganti Bahasa" aria-label="Language">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </button>
      <button class="icon-btn" title="Bantuan" aria-label="Help">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">
    <div class="card" id="loginCard">

      <!-- Logo -->
      <div class="logo-wrap">
        <svg class="logo-svg" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg" aria-label="Indofood">
          <!-- wordmark drawn as text -->
          <text x="10" y="42" font-family="'Georgia', serif" font-size="38" font-style="italic" font-weight="700" fill="#003F8A" letter-spacing="-1">Indofood</text>
          <line x1="10" y1="47" x2="190" y2="47" stroke="#003F8A" stroke-width="1.2"/>
          <text x="10" y="58" font-family="Arial, sans-serif" font-size="7.5" fill="#6B7280" letter-spacing="2.5">THE SYMBOL OF   QUALITY  FOODS</text>
        </svg>
      </div>

      <h1 class="card-title">Masuk ke Indofood</h1>

      <!-- Alert box -->
      <div class="alert" id="alertBox" role="alert" aria-live="polite"></div>

      <!-- Form -->
      <form id="loginForm" novalidate>

        <div class="field-group">
          <label class="field-label" for="email">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input
              id="email"
              name="email"
              type="email"
              class="field-input"
              placeholder="nama@perusahaan.com"
              autocomplete="email"
              required
            />
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="field-group">
          <div class="password-header">
            <label class="field-label" for="password">Password</label>
            <a href="#" class="forgot-link" id="forgotLink">Lupa Password?</a>
          </div>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              id="password"
              name="password"
              type="password"
              class="field-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="eye-btn" id="togglePwd" aria-label="Tampilkan password">
              <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="remember-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" name="remember" />
            <span class="checkmark"></span>
            Ingat saya
          </label>
        </div>

        <button type="submit" class="btn-masuk" id="submitBtn">
          <span class="btn-text">Masuk</span>
          <span class="btn-spinner" id="spinner" hidden></span>
        </button>

      </form>

      <div class="divider"><span>atau</span></div>

      <div class="support-row">
        Butuh bantuan akses?&nbsp;<a href="mailto:itsupport@indofood.com" class="support-link">Hubungi IT Support</a>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-brand">Indofood</div>
    <nav class="footer-nav">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
      <a href="#">Contact Support</a>
    </nav>
    <p class="footer-copy">© 2024 PT Indofood CBP Sukses Makmur Tbk. All Rights Reserved.</p>
  </footer>

  <!-- Forgot Password Modal -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <button class="modal-close" id="modalClose" aria-label="Tutup">&times;</button>
      <h2 class="modal-title" id="modalTitle">Reset Password</h2>
      <p class="modal-desc">Masukkan email Anda dan kami akan mengirimkan instruksi reset password.</p>
      <div class="field-group">
        <label class="field-label" for="resetEmail">Email Address</label>
        <div class="input-wrap">
          <input id="resetEmail" type="email" class="field-input" placeholder="nama@perusahaan.com" />
        </div>
      </div>
      <button class="btn-masuk" id="resetBtn">Kirim Instruksi</button>
      <div class="modal-feedback" id="modalFeedback"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
