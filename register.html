<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - FoodSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* Toast notification */
    .toast {
      position: fixed;
      top: 30px;
      right: 30px;
      z-index: 9999;
      padding: 16px 28px;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      opacity: 0;
      transform: translateY(-20px);
      transition: opacity 0.4s, transform 0.4s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .toast.success { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .toast.error   { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .toast.loading { background: linear-gradient(135deg, #3b82f6, #2563eb); }
  </style>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body,
    html {
      height: 100%;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('gedung3.png');
      background-size: cover;
      background-position: center;
      z-index: -1;
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(14, 55, 107, 0.75);
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .main-card {
      background: #ffffff;
      border-radius: 40px;
      display: flex;
      padding: 15px;
      width: 100%;
      max-width: 950px;
      height: 600px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2);
    }

    .image-panel {
      flex: 1;
      background-image: url('gedung3.png');
      background-size: cover;
      background-position: center;
      border-radius: 35px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .form-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 20px;
    }

    .header-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .title {
      font-size: 38px;
      font-weight: 800;
      color: #0b3f8a;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 15px;
      font-weight: 500;
      color: #0b3f8a;
    }

    .form-wrapper {
      width: 85%;
      max-width: 380px;
      margin: 0 auto;
    }

    .form-row {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
      flex: 1;
    }

    .form-row .form-group {
      margin-bottom: 0;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #000;
      margin-bottom: 8px;
    }

    .form-control {
      width: 100%;
      height: 46px;
      border: 1.5px solid #2e8af6;
      border-radius: 12px;
      padding: 0 16px;
      font-size: 14px;
      color: #333;
      outline: none;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.3s;
    }

    .form-control::placeholder {
      color: #9ab3cf;
    }

    .form-control:focus {
      border-color: #0b3f8a;
    }

    .options {
      display: flex;
      align-items: center;
      margin-bottom: 30px;
      margin-top: -5px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      font-size: 12px;
      font-weight: 500;
      color: #000;
      cursor: pointer;
    }

    .checkbox-label input {
      margin-right: 8px;
      accent-color: #2e8af6;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      height: 48px;
      background-color: #0b3f8a;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    .btn-submit:hover {
      background-color: #082d66;
      transform: translateY(-1px);
    }

    .glass-card {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 35px;
      padding: 50px 30px;
      width: 320px;
      text-align: center;
      color: #fff;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .glass-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 5px;
      line-height: 1.2;
    }

    .glass-subtitle {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 40px;
      color: #fff;
    }

    .glass-text {
      font-size: 12px;
      color: #d0e1f9;
      margin-bottom: 12px;
    }

    .btn-signin {
      width: 100%;
      height: 46px;
      background-color: #0076f5;
      color: #fff;
      border: none;
      border-radius: 23px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    .btn-signin:hover {
      background-color: #005ec3;
      transform: translateY(-1px);
    }

    @media (max-width: 800px) {
      .main-card {
        flex-direction: column;
        height: auto;
        border-radius: 30px;
      }

      .image-panel {
        display: none;
      }

      .form-panel {
        padding: 50px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <div class="page-wrapper">
    <div class="main-card">
      <div class="image-panel">
        <div class="glass-card">
          <h2 class="glass-title">Welcome To<br>PT Indofood</h2>
          <p class="glass-subtitle">We hope you had a great day</p>

          <p class="glass-text">Have an account?</p>
          <button type="button" class="btn-signin" onclick="window.location.href='signin.html'">Sign In</button>
        </div>
      </div>

      <div class="form-panel">
        <div class="header-section">
          <h1 class="title">Create Account</h1>
          <p class="subtitle">Please enter your details</p>
        </div>

        <div class="form-wrapper">
          <form id="registerForm">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="firstName">First Name</label>
                <input type="text" id="firstName" class="form-control" placeholder="E.g. Nara" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="lastName">Last Name</label>
                <input type="text" id="lastName" class="form-control" placeholder="E.g. Nala" required>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="email">Email</label>
              <input type="email" id="email" class="form-control" placeholder="E.g. nayla.mardhiyah24" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <input type="password" id="password" class="form-control" placeholder="E.g. nayla.mardhiyah24" required>
            </div>

            <div class="options">
              <label class="checkbox-label">
                <input type="checkbox" checked>
                Remember log in activity
              </label>
            </div>

            <button type="submit" class="btn-submit">Sign Up</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDL36048RpIK_-_vyg0s_92pWRjM91mhKA",
      authDomain: "sistem-erp-food-sync.firebaseapp.com",
      projectId: "sistem-erp-food-sync",
      storageBucket: "sistem-erp-food-sync.firebasestorage.app",
      messagingSenderId: "9152919413",
      appId: "1:9152919413:web:4ad7cf28f57ef83d23453c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Toast helper
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => { toast.className = 'toast'; }, 3500);
    }

    document.getElementById('registerForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitBtn = this.querySelector('.btn-submit');

      // Disable button while processing
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating Account...';
      showToast('⏳ Creating your account...', 'loading');

      try {
        // 1. Create user in Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 2. Save display name to Auth profile
        await updateProfile(user, {
          displayName: firstName + ' ' + lastName
        });

        // 3. Save user profile to Firestore
        await setDoc(doc(db, "users", user.uid), {
          uid: user.uid,
          email: email,
          username: email.split('@')[0],
          fullName: firstName + ' ' + lastName,
          role: 'GUEST',
          status: 'ACTIVE',
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        showToast('✅ Registration successful! Redirecting to Sign In...', 'success');

        // Redirect after short delay so user sees the toast
        setTimeout(() => {
          window.location.href = 'signin.html';
        }, 1500);

      } catch (error) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign Up';

        if (error.code === 'auth/email-already-in-use') {
          showToast('❌ Email is already registered. Please sign in.', 'error');
        } else if (error.code === 'auth/weak-password') {
          showToast('❌ Password should be at least 6 characters.', 'error');
        } else if (error.code === 'auth/invalid-email') {
          showToast('❌ Please enter a valid email address.', 'error');
        } else {
          showToast('❌ Registration failed: ' + error.message, 'error');
        }
      }
    });
  </script>
<script type="module" src="js/notifications.js"></script>
</body>

</html>
